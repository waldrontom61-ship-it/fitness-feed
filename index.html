<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Tips Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }
    
    .font-display {
      font-family: 'Playfair Display', Georgia, serif;
    }
    
    .font-body {
      font-family: 'Outfit', system-ui, sans-serif;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    @keyframes slide-up {
      from { 
        opacity: 0; 
        transform: translateY(60px) scale(0.95); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }

    @keyframes slide-down {
      from { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
      to { 
        opacity: 0; 
        transform: translateY(-60px) scale(0.95); 
      }
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes number-pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .floating-shape {
      animation: float 8s ease-in-out infinite;
    }

    .floating-shape:nth-child(2) {
      animation-delay: -2s;
      animation-duration: 10s;
    }

    .floating-shape:nth-child(3) {
      animation-delay: -4s;
      animation-duration: 12s;
    }

    .glow-orb {
      animation: pulse-glow 4s ease-in-out infinite;
    }

    .tip-card {
      opacity: 0;
      position: absolute;
      width: 100%;
      pointer-events: none;
    }

    .tip-card.active {
      opacity: 1;
      position: relative;
      pointer-events: auto;
      animation: slide-up 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .tip-card.exiting {
      animation: slide-down 0.6s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }

    .tip-card.active .tip-icon {
      animation: number-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    .tip-card.active .tip-title {
      animation: fade-in-up 0.6s ease-out 0.3s both;
    }

    .tip-card.active .tip-description {
      animation: fade-in-up 0.6s ease-out 0.4s both;
    }

    .tip-card.active .tip-category {
      animation: fade-in-up 0.6s ease-out 0.5s both;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.1s linear;
    }

    .nav-dot {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .nav-dot.active {
      transform: scale(1.4);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .gradient-text {
      background: linear-gradient(135deg, #059669 0%, #0d9488 50%, #0891b2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full font-body">
  <div id="app" class="h-full w-full overflow-auto relative"><!-- Animated Background -->
   <div class="absolute inset-0 overflow-hidden" style="background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 25%, #ecfeff 50%, #f0f9ff 75%, #eff6ff 100%);"><!-- Floating Shapes -->
    <div class="floating-shape absolute top-[10%] left-[10%] w-32 h-32 rounded-full opacity-30" style="background: linear-gradient(135deg, #10b981, #14b8a6);"></div>
    <div class="floating-shape absolute top-[60%] right-[15%] w-48 h-48 rounded-full opacity-20" style="background: linear-gradient(135deg, #0891b2, #3b82f6);"></div>
    <div class="floating-shape absolute bottom-[20%] left-[20%] w-24 h-24 rounded-full opacity-25" style="background: linear-gradient(135deg, #8b5cf6, #ec4899);"></div><!-- Glow Orbs -->
    <div class="glow-orb absolute top-[30%] right-[30%] w-64 h-64 rounded-full" style="background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);"></div>
    <div class="glow-orb absolute bottom-[30%] left-[25%] w-80 h-80 rounded-full" style="background: radial-gradient(circle, rgba(8, 145, 178, 0.12) 0%, transparent 70%); animation-delay: -2s;"></div>
   </div><!-- Main Content -->
   <div class="relative z-10 h-full flex flex-col items-center justify-center px-4 py-8"><!-- Header -->
    <header class="text-center mb-8 md:mb-12">
     <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/60 backdrop-blur-sm shadow-sm mb-4"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> <span class="text-sm font-medium text-emerald-700" id="subtitle-display">Daily Wellness Inspiration</span>
     </div>
     <h1 id="main-title-display" class="font-display text-4xl md:text-5xl lg:text-6xl font-bold gradient-text mb-2">Heart Health Facts</h1>
    </header><!-- Tips Container -->
    <div class="w-full max-w-4xl relative" style="min-height: 320px;">
     <div id="feed" class="relative"></div>
    </div><!-- Navigation -->
    <div class="mt-8 md:mt-12 flex flex-col items-center gap-6"><!-- Progress Timer -->
     <div class="relative">
      <svg class="progress-ring w-16 h-16" viewbox="0 0 60 60"><circle class="stroke-emerald-100" cx="30" cy="30" r="26" fill="none" stroke-width="4" /> <circle id="progress-circle" class="progress-ring-circle stroke-emerald-500" cx="30" cy="30" r="26" fill="none" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.36" stroke-dashoffset="0" />
      </svg>
      <div class="absolute inset-0 flex items-center justify-center"><span id="timer-display" class="text-sm font-semibold text-emerald-700">10</span>
      </div>
     </div><!-- Dot Navigation -->
     <div id="nav-dots" class="flex gap-3"></div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      main_title: "Heart Health Facts",
      subtitle: "February is Heart Health Month at the YMCA",
      background_color: "#ecfdf5",
      surface_color: "#ffffff",
      text_color: "#064e3b",
      primary_action_color: "#059669",
      secondary_action_color: "#0d9488",
      font_family: "Outfit",
      font_size: 16
    };

    let config = { ...defaultConfig };

    // Health tips data - will be populated from JSON
    let healthTips = [];

    let currentIndex = 0;
    let isPaused = false;
    let timer = 10;
    let intervalId = null;
    const INTERVAL_DURATION = 10;

    function createTipCard(tip, index) {
      const categoryColors = {
        "Hydration": { bg: "bg-blue-50", text: "text-blue-700", border: "border-blue-200" },
        "Movement": { bg: "bg-amber-50", text: "text-amber-700", border: "border-amber-200" },
        "Rest": { bg: "bg-purple-50", text: "text-purple-700", border: "border-purple-200" },
        "Nutrition": { bg: "bg-green-50", text: "text-green-700", border: "border-green-200" },
        "Mental Health": { bg: "bg-rose-50", text: "text-rose-700", border: "border-rose-200" },
        "Digital Wellness": { bg: "bg-cyan-50", text: "text-cyan-700", border: "border-cyan-200" }
      };

      const colors = categoryColors[tip.category] || { bg: "bg-gray-50", text: "text-gray-700", border: "border-gray-200" };

      const div = document.createElement('div');
      div.className = `tip-card glass-card rounded-3xl p-8 md:p-12 shadow-2xl border border-white/50`;
      div.dataset.index = index;
      
      div.innerHTML = `
        <div class="flex flex-col items-center text-center">
          <h2 class="tip-title font-display text-3xl md:text-4xl font-bold mb-4" style="color: ${config.text_color};">
            ${tip.title}
          </h2>
          <p class="tip-description text-lg md:text-xl leading-relaxed max-w-2xl mb-6" style="color: ${config.text_color}; opacity: 0.8;">
            ${tip.description}
          </p>
          <span class="tip-category inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium ${colors.bg} ${colors.text} border ${colors.border}">
            <span class="w-1.5 h-1.5 rounded-full bg-current"></span>
            ${tip.category}
          </span>
        </div>
      `;

      return div;
    }

    function createNavDots() {
      const container = document.getElementById('nav-dots');
      container.innerHTML = '';
      
      healthTips.forEach((_, index) => {
        const dot = document.createElement('button');
        dot.className = `nav-dot w-3 h-3 rounded-full transition-all duration-300 ${index === currentIndex ? 'active bg-emerald-500' : 'bg-emerald-200 hover:bg-emerald-300'}`;
        dot.setAttribute('aria-label', `Go to tip ${index + 1}`);
        dot.addEventListener('click', () => goToTip(index));
        container.appendChild(dot);
      });
    }

    function updateNavDots() {
      const dots = document.querySelectorAll('.nav-dot');
      dots.forEach((dot, index) => {
        if (index === currentIndex) {
          dot.classList.add('active', 'bg-emerald-500');
          dot.classList.remove('bg-emerald-200');
        } else {
          dot.classList.remove('active', 'bg-emerald-500');
          dot.classList.add('bg-emerald-200');
        }
      });
    }

    function updateProgress() {
      const circle = document.getElementById('progress-circle');
      const timerDisplay = document.getElementById('timer-display');
      const circumference = 163.36;
      const offset = circumference * (1 - timer / INTERVAL_DURATION);
      circle.style.strokeDashoffset = offset;
      timerDisplay.textContent = timer;
    }

    function showTip(newIndex, direction = 'next') {
      const cards = document.querySelectorAll('.tip-card');
      const currentCard = document.querySelector('.tip-card.active');
      
      if (currentCard) {
        currentCard.classList.add('exiting');
        currentCard.classList.remove('active');
        
        setTimeout(() => {
          currentCard.classList.remove('exiting');
        }, 600);
      }

      setTimeout(() => {
        cards[newIndex].classList.add('active');
      }, direction === 'instant' ? 0 : 300);

      currentIndex = newIndex;
      updateNavDots();
      timer = INTERVAL_DURATION;
      updateProgress();
    }

    function goToTip(index) {
      if (index === currentIndex) return;
      showTip(index, 'instant');
    }

    function nextTip() {
      const newIndex = (currentIndex + 1) % healthTips.length;
      showTip(newIndex, 'next');
    }

    function prevTip() {
      const newIndex = (currentIndex - 1 + healthTips.length) % healthTips.length;
      showTip(newIndex, 'prev');
    }

    function togglePause() {
      isPaused = !isPaused;
      const pauseIcon = document.getElementById('pause-icon');
      const playIcon = document.getElementById('play-icon');
      
      if (isPaused) {
        pauseIcon.classList.add('hidden');
        playIcon.classList.remove('hidden');
      } else {
        pauseIcon.classList.remove('hidden');
        playIcon.classList.add('hidden');
      }
    }

    function startTimer() {
      intervalId = setInterval(() => {
        if (!isPaused) {
          timer--;
          updateProgress();
          
          if (timer <= 0) {
            nextTip();
          }
        }
      }, 1000);
    }

    function applyStyles() {
      const mainTitle = document.getElementById('main-title-display');
      const subtitle = document.getElementById('subtitle-display');
      
      if (mainTitle) {
        mainTitle.textContent = config.main_title || defaultConfig.main_title;
      }
      if (subtitle) {
        subtitle.textContent = config.subtitle || defaultConfig.subtitle;
      }

      // Apply font family
      const fontFamily = config.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${fontFamily}, system-ui, sans-serif`;
    }

    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      applyStyles();
    }

    function mapToCapabilities(cfg) {
      return {
        recolorables: [
          {
            get: () => cfg.background_color || defaultConfig.background_color,
            set: (value) => {
              cfg.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => cfg.surface_color || defaultConfig.surface_color,
            set: (value) => {
              cfg.surface_color = value;
              window.elementSdk.setConfig({ surface_color: value });
            }
          },
          {
            get: () => cfg.text_color || defaultConfig.text_color,
            set: (value) => {
              cfg.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => cfg.primary_action_color || defaultConfig.primary_action_color,
            set: (value) => {
              cfg.primary_action_color = value;
              window.elementSdk.setConfig({ primary_action_color: value });
            }
          },
          {
            get: () => cfg.secondary_action_color || defaultConfig.secondary_action_color,
            set: (value) => {
              cfg.secondary_action_color = value;
              window.elementSdk.setConfig({ secondary_action_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => cfg.font_family || defaultConfig.font_family,
          set: (value) => {
            cfg.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => cfg.font_size || defaultConfig.font_size,
          set: (value) => {
            cfg.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(cfg) {
      return new Map([
        ["main_title", cfg.main_title || defaultConfig.main_title],
        ["subtitle", cfg.subtitle || defaultConfig.subtitle]
      ]);
    }

    // Initialize
    function init() {
      // Fetch tips from JSON
      fetch('fitness-tips.json')
        .then(res => res.json())
        .then(data => {
          healthTips = data;
          setupUI();
        })
        .catch(error => {
          console.error('Error loading tips:', error);
          // Show error state
          document.getElementById('feed').innerHTML = '<p style="color: red;">Failed to load tips. Please check your JSON file.</p>';
        });
    }

    function setupUI() {
      const container = document.getElementById('feed');
      
      // Create tip cards
      healthTips.forEach((tip, index) => {
        const card = createTipCard(tip, index);
        if (index === 0) card.classList.add('active');
        container.appendChild(card);
      });

      // Create navigation dots
      createNavDots();

      // Start auto-rotation
      updateProgress();
      startTimer();
      applyStyles();

      // Initialize Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities,
          mapToEditPanelValues
        });
      }
    }

    init();
  </script>
