<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fitness Tips Feed</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(to right, #f5f7fa, #c3cfe2);
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .feed-container {
    width: 80%;
    max-width: 1200px;
    text-align: center;
    position: relative;
  }

  .tip-card {
    background: rgba(255,255,255,0.9);
    border-radius: 15px;
    padding: 40px 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    opacity: 0;
    position: absolute;
    width: 100%;
    transition: opacity 1s ease-in-out;
  }

  .tip-card.active {
    opacity: 1;
    position: relative;
  }

  .tip-card h2 {
    font-size: 2.5em;
    margin-bottom: 20px;
    color: #1a237e;
  }

  .tip-card p {
    font-size: 1.5em;
    line-height: 1.4;
    color: #333;
  }

</style>
</head>
<body>
  <div class="feed-container" id="feed"></div>

<script>
fetch('fitness-tips.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('feed');

    data.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'tip-card';
      if (i === 0) div.classList.add('active'); // first one visible
      div.innerHTML = `<h2>${item.title}</h2><p>${item.description}</p>`;
      container.appendChild(div);
    });

    let index = 0;
    const cards = document.querySelectorAll('.tip-card');

    setInterval(() => {
      cards[index].classList.remove('active');
      index = (index + 1) % cards.length;
      cards[index].classList.add('active');
    }, 10000); // rotate every 10 seconds
  });
</script>
</body>
</html>
